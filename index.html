<!doctype html>
<html lang="en-US">
  <head>
    <meta charset="utf-8" />
    <title>pi-wasm</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  </head>
  <body>
    <div style ="width: 600px; margin-left: auto; margin-right: auto;">
        <canvas id="myChart" style="border:1px solid"></canvas>
        <script src="linechart.js"></script>
        <canvas id="myDots" style="border:1px solid"></canvas>
        <script src="dots.js"></script>
    </div>
    <script type="module">
      import init, { approximate_pi } from "./pkg/pi_wasm.js";
      init().then(() => {
        
        const ctx = document.getElementById('myChart');
        const ctx2 = document.getElementById('myDots');
        const [arr,labels, dots] = approximate_pi();
        chart_pi(ctx, arr, labels);
        show_dots(ctx2, dots);
      });
    </script>
  </body>
</html>
